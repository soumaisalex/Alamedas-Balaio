<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5EFE0">
    <title>Balaio Junino · Alamedas 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --bg: #F5EFE0; --bg2: #EDE5CC; --card: #FFFFFF;
          --orange: #E8651A; --orange2: #F07830; --orange-l: #FFF1E8;
          --green: #22C55E; --green-l: #DCFCE7; --red: #EF4444; --red-l: #FEE2E2;
          --amber: #F59E0B; --amber-l: #FEF3C7; --text: #1C1917;
          --text2: #57534E; --text3: #A8A29E; --border: #E7DDD0;
          --shadow: 0 2px 12px rgba(0,0,0,0.08); --radius: 16px; --radius-sm: 10px;
        }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        
        /* Bandeirolas Pé de Pato */
        .bunting { width:100%; height:48px; position:relative; overflow:hidden; z-index:10; background:#8B5E2C; }
        .bunting-flags { display:flex; position:absolute; top:4px; left:-10px; }
        .flag { 
            width:28px; height:40px; 
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 80%, 0% 100%);
            flex-shrink:0; margin:0 2px; 
            animation: sway 1.2s ease-in-out infinite alternate; 
            transform-origin: top center; 
        }
        @keyframes sway { from{transform:rotate(-8deg)} to{transform:rotate(8deg)} }

        .page { display:none; padding: 16px; max-width: 480px; margin: 0 auto; }
        .page.active { display:block; }
        .card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom: 16px; overflow:hidden; }
        .card-body { padding:18px; }
        
        .progress-wrap { background:var(--bg2); border-radius:100px; height:36px; overflow:hidden; position:relative; }
        .progress-fill { height:100%; background:linear-gradient(90deg,var(--orange),#FFB800); transition:width 1s cubic-bezier(0.34,1.56,0.64,1); }
        .progress-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:800; }

        .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom: 16px; }
        .stat-card { background:var(--card); border-radius:var(--radius-sm); padding:14px 10px; text-align:center; border:1.5px solid var(--border); }
        .stat-num { font-size:1.4rem; font-weight:900; }
        .stat-lbl { font-size:0.7rem; color:var(--text3); }

        .form-group { margin-bottom:14px; }
        .form-label { display:block; font-size:0.82rem; font-weight:700; margin-bottom:6px; }
        .inp { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:13px; font-family:inherit; outline:none; }
        
        .btn-primary { width:100%; background:var(--orange); color:#fff; font-weight:800; padding:15px; border:none; border-radius:100px; cursor:pointer; box-shadow:0 4px 16px rgba(232,101,26,0.3); }
        .btn-sm { padding:6px 12px; border-radius:100px; border:none; cursor:pointer; font-size: 0.75rem; font-weight: 700; }
        .btn-red { background: var(--red-l); color: var(--red); }
        .btn-green { background: var(--green-l); color: var(--green); }
        .btn-amber { background: var(--amber-l); color: var(--amber); }

        .p-card { background:var(--card); border-radius:var(--radius-sm); padding:14px; border-left:4px solid var(--border); margin-bottom: 10px; box-shadow: var(--shadow); }
        .p-card.pago { border-left-color:var(--green); }
        .modal-bg { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.5); display:flex; align-items:flex-end; justify-content:center; }
        .modal-box { background:var(--card); border-radius:24px 24px 0 0; width:100%; max-width:480px; padding:24px; animation:slideUp 0.3s ease; }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .hidden { display:none !important; }
        .spin { display:inline-block; animation:spin 1s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#000; color:#fff; padding:12px 24px; border-radius:100px; font-size:0.85rem; opacity:0; transition:0.3s; z-index:999; }
        #toast.show { opacity:1; }
    </style>
</head>
<body>

    <div class="bunting"><div class="bunting-flags" id="flags"></div></div>

    <div id="page-main" class="page active">
        <div style="text-align:center; margin: 20px 0;">
            <h1 style="font-weight:900;">Balaio Alamedas</h1>
            <p id="hdr-desc" style="color:var(--text3);">Carregando evento...</p>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="progress-wrap" style="margin-bottom:8px;">
                    <div id="progress-fill" class="progress-fill" style="width:0%"></div>
                    <div id="progress-label" class="progress-label">0%</div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text3);">
                    <span>Acumulado: <strong id="thermo-val">R$ 0</strong></span>
                    <span>Meta: <strong id="thermo-meta">R$ 0</strong></span>
                </div>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-num" id="stat-inscritos">0</div>
                <div class="stat-lbl">Inscritos</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" style="color:var(--green)" id="stat-confirmados">0</div>
                <div class="stat-lbl">Confirmados</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" style="color:var(--amber)" id="stat-pendentes">0</div>
                <div class="stat-lbl">Pendentes</div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h3 style="margin-bottom:14px;">🧺 Faça sua Inscrição</h3>
                <div class="form-group">
                    <label class="form-label">Nome Completo</label>
                    <input id="f-nome" class="inp" type="text" placeholder="Seu nome">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="form-group">
                        <label class="form-label">Bloco</label>
                        <input id="f-bloco" class="inp" type="text" placeholder="Ex: A">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Apto</label>
                        <input id="f-apt" class="inp" type="text" placeholder="Ex: 101">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Quantidade de Cotas</label>
                    <select id="f-qtd" class="inp"></select>
                </div>
                <button id="btn-inscrever" class="btn-primary">🔥 Participar do Balaio</button>
                <p id="form-error" style="color:var(--red); font-size:0.8rem; margin-top:10px;" class="hidden"></p>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h3 style="margin-bottom:10px;">📋 Itens do Balaio</h3>
                <div id="itens-list"></div>
                <div style="margin-top:14px; padding-top:10px; border-top:2px dashed var(--border); display:flex; justify-content:space-between; font-weight:900;">
                    <span>Total Estimado:</span>
                    <span id="total-balaio">R$ 0,00</span>
                </div>
            </div>
        </div>

        <button onclick="abrirAdmin()" style="width:100%; background:transparent; border:1px solid var(--border); padding:12px; border-radius:100px; color:var(--text3); font-size:0.8rem; margin-top:20px;">🔐 Área Administrativa</button>
    </div>

    <div id="page-admin" class="page">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
            <button onclick="voltarMain()" class="btn-sm" style="background:var(--bg2);">← Voltar</button>
            <h1 style="font-weight:900;">Painel Admin</h1>
        </div>

        <div class="card">
            <div class="card-body">
                <div style="display:flex; gap:8px; margin-bottom:15px;">
                    <button onclick="mudarTab('participantes')" class="btn-sm btn-green">Participantes</button>
                    <button onclick="imprimirListaSorteio()" class="btn-sm btn-amber">🖨️ Imprimir p/ Sorteio</button>
                    <button onclick="logout()" class="btn-sm btn-red">Sair</button>
                </div>
                <div id="adm-content">
                    <input type="text" id="search-input" class="inp" placeholder="🔍 Buscar..." oninput="filtrarParticipantes()" style="margin-bottom:15px;">
                    <div id="lista-participantes"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-pix" class="modal-bg hidden">
        <div class="modal-box">
            <h2 style="text-align:center; margin-bottom:10px;">Quase lá! 🤠</h2>
            <p style="text-align:center; font-size:0.9rem; color:var(--text2); margin-bottom:20px;">Pague o PIX para confirmar sua participação.</p>
            <div style="text-align:center; margin-bottom:20px;">
                <p style="font-size:0.8rem; color:var(--text3);">Valor Total</p>
                <p id="pix-valor" style="font-size:2rem; font-weight:900; color:var(--orange);">R$ 0,00</p>
            </div>
            <div id="qr-box" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <div class="form-group">
                <label class="form-label">Código Copia e Cola</label>
                <div style="display:flex; gap:5px;">
                    <input id="pix-payload" class="inp" readonly style="font-size:0.7rem;">
                    <button onclick="copiarPix()" class="btn-sm btn-green">Copiar</button>
                </div>
            </div>
            <button onclick="fecharModal('modal-pix')" class="btn-primary">Já paguei / Fechar</button>
        </div>
    </div>

    <div id="modal-login" class="modal-bg hidden">
        <div class="modal-box">
            <h3>🔐 Login Admin</h3>
            <div class="form-group" style="margin-top:15px;">
                <input id="login-senha" type="password" class="inp" placeholder="Senha">
            </div>
            <button id="btn-login" class="btn-primary" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const API_BASE = 'https://alamedas-balaio.alexdesouzapassos.workers.dev';
        let adminToken = localStorage.getItem('ba_token');
        let todosParticipantes = [];
        let configGlobal = {};

        // Helper BRL
        const brl = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);

        // Bandeirinhas
        const cores = ['#FF4136', '#FF851B', '#FFDC00', '#2ECC40', '#0074D9', '#B10DC9', '#FF69B4', '#01FF70'];
        const container = document.getElementById('flags');
        for(let i=0; i<25; i++) {
            const f = document.createElement('div');
            f.className = 'flag';
            f.style.background = cores[i % cores.length];
            container.appendChild(f);
        }

        async function carregarDados() {
            try {
                const res = await fetch(`${API_BASE}/api/dados`);
                const data = await res.json();
                configGlobal = data.config;
                
                document.getElementById('hdr-desc').textContent = data.config.data_evento || 'Festa Junina Alamedas';
                document.getElementById('stat-inscritos').textContent = data.stats.total_inscritos;
                document.getElementById('stat-confirmados').textContent = data.stats.total_pagos;
                document.getElementById('stat-pendentes').textContent = data.stats.total_inscritos - data.stats.total_pagos;
                
                // Update Seletor Cotas
                const v = parseFloat(data.config.valor_quota || 10);
                document.getElementById('f-qtd').innerHTML = [1,2,3,5,10].map(n => `<option value="${n}">${n} cotas (${brl(n*v)})</option>`).join('');

                // Termômetro
                const meta = parseFloat(data.config.meta_balaio || 500);
                const arrec = parseFloat(data.stats.total_arrecadado);
                const pct = Math.min(100, (arrec/meta)*100);
                document.getElementById('progress-fill').style.width = pct + '%';
                document.getElementById('progress-label').textContent = pct.toFixed(1) + '%';
                document.getElementById('thermo-val').textContent = brl(arrec);
                document.getElementById('thermo-meta').textContent = brl(meta);

                // Lista Itens
                document.getElementById('itens-list').innerHTML = data.itens.map(it => `
                    <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:5px;">
                        <span>${it.icone} ${it.nome} (x${it.quantidade})</span>
                        <span>${brl(it.preco_estimado * it.quantidade)}</span>
                    </div>
                `).join('');
                const total = data.itens.reduce((acc, it) => acc + (it.preco_estimado * it.quantidade), 0);
                document.getElementById('total-balaio').textContent = brl(total);

            } catch (e) { console.error(e); }
        }

        document.getElementById('btn-inscrever').onclick = async () => {
            const btn = document.getElementById('btn-inscrever');
            const err = document.getElementById('form-error');
            const payload = {
                nome: document.getElementById('f-nome').value,
                bloco: document.getElementById('f-bloco').value,
                apartamento: document.getElementById('f-apt').value,
                quantidade: document.getElementById('f-qtd').value
            };

            if(!payload.nome || !payload.bloco || !payload.apartamento) return toast('Preencha tudo, sô!');

            btn.disabled = true; btn.innerHTML = '<span class="spin">⏳</span>';
            try {
                const res = await fetch(`${API_BASE}/api/inscricao`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);

                // PIX
                document.getElementById('pix-valor').textContent = brl(data.pix.valor);
                document.getElementById('pix-payload').value = data.pix.payload;
                const qrBox = document.getElementById('qr-box');
                qrBox.innerHTML = '';
                new QRCode(qrBox, {text: data.pix.payload, width:200, height:200});
                
                document.getElementById('modal-pix').classList.remove('hidden');
                carregarDados();
            } catch (e) { toast(e.message); }
            finally { btn.disabled = false; btn.innerHTML = '🔥 Participar do Balaio'; }
        };

        // ADMIN FUNCTIONS
        function abrirAdmin() { 
            if(adminToken) {
                document.getElementById('page-main').classList.remove('active');
                document.getElementById('page-admin').classList.add('active');
                carregarAdmin();
            } else { document.getElementById('modal-login').classList.remove('hidden'); }
        }

        async function fazerLogin() {
            const senha = document.getElementById('login-senha').value;
            try {
                const res = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    body: JSON.stringify({senha})
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);
                adminToken = data.token;
                localStorage.setItem('ba_token', data.token);
                document.getElementById('modal-login').classList.add('hidden');
                abrirAdmin();
            } catch (e) { toast(e.message); }
        }

        async function carregarAdmin() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/participantes`, {
                    headers: {'Authorization': `Bearer ${adminToken}`}
                });
                const data = await res.json();
                todosParticipantes = data.participantes;
                filtrarParticipantes();
            } catch (e) { logout(); }
        }

        function filtrarParticipantes() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const list = document.getElementById('lista-participantes');
            const filtered = todosParticipantes.filter(p => p.nome.toLowerCase().includes(q) || p.bloco.toLowerCase().includes(q));
            
            list.innerHTML = filtered.map(p => `
                <div class="p-card ${p.status_pagamento}">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <strong>${p.nome}</strong> (${p.quantidade} cotas)<br>
                            <small>Bloco ${p.bloco} - Apto ${p.apartamento}</small>
                        </div>
                        <div style="text-align:right">
                            <span class="btn-sm ${p.status_pagamento === 'pago' ? 'btn-green' : 'btn-amber'}">${p.status_pagamento}</span>
                        </div>
                    </div>
                    <div style="margin-top:10px; display:flex; gap:5px;">
                        ${p.status_pagamento !== 'pago' ? `<button onclick="alterarStatus(${p.id}, 'pago')" class="btn-sm btn-green">Confirmar</button>` : ''}
                        <button onclick="excluirParticipante(${p.id})" class="btn-sm btn-red">🗑️ Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        async function alterarStatus(id, status) {
            await fetch(`${API_BASE}/api/admin/confirmar`, {
                method: 'POST',
                headers: {'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json'},
                body: JSON.stringify({id, status})
            });
            carregarAdmin(); carregarDados();
        }

        async function excluirParticipante(id) {
            if(!confirm('Deseja excluir permanentemente?')) return;
            const res = await fetch(`${API_BASE}/api/admin/participante/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${adminToken}`}
            });
            if(res.ok) { toast('Removido!'); carregarAdmin(); carregarDados(); }
        }

        function imprimirListaSorteio() {
            const pagantes = todosParticipantes.filter(p => p.status_pagamento === 'pago');
            let win = window.open('', '_blank');
            win.document.write(`
                <html><head><title>Sorteio Balaio</title>
                <style>
                    body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 10px; }
                    .ticket { border: 2px dashed #000; padding: 15px; width: 220px; text-align: center; }
                    @media print { .no-print { display: none; } }
                </style></head><body>
                <button class="no-print" onclick="window.print()">Imprimir Agora</button>
            `);
            pagantes.forEach(p => {
                for(let i=0; i<p.quantidade; i++) {
                    win.document.write(`
                        <div class="ticket">
                            <h3 style="margin:0">BALAIO 2026</h3>
                            <hr>
                            <strong>${p.nome}</strong><br>
                            Bloco ${p.bloco} - Apto ${p.apartamento}<br>
                            <small>Cota ${i+1}/${p.quantidade}</small>
                        </div>
                    `);
                }
            });
            win.document.write('</body></html>');
            win.document.close();
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        function fecharModal(id) { document.getElementById(id).classList.add('hidden'); }
        function voltarMain() { document.getElementById('page-admin').classList.remove('active'); document.getElementById('page-main').classList.add('active'); }
        function logout() { localStorage.removeItem('ba_token'); location.reload(); }
        function copiarPix() { document.getElementById('pix-payload').select(); document.execCommand('copy'); toast('Código copiado!'); }

        // Init
        carregarDados();
        setInterval(carregarDados, 60000);
    </script>
</body>
</html>
